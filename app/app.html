<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task & Habit Tracker App</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --danger-color: #e74c3c;
            --success-color: #2ecc71;
            --border-color: #e0e0e0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 480px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 24px;
            text-align: center;
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 4px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .app-body {
            padding: 20px;
        }

        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        button.btn-add {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button.btn-add:hover {
            opacity: 0.9;
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: #f9f9f9;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s;
        }

        .task-item.completed {
            background: #f0fbf5;
            border-color: var(--success-color);
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #888888;
        }

        .task-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success-color);
        }

        .task-text {
            font-size: 16px;
            word-break: break-word;
        }

        .btn-delete {
            background: transparent;
            color: var(--danger-color);
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.1s;
        }

        .btn-delete:hover {
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            color: #888888;
            padding: 20px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>My Daily Planner</h1>
            <p id="date-string">Track your progress</p>
        </header>

        <div class="app-body">
            <div class="input-group">
                <input type="text" id="task-input" placeholder="Add a new task..." autocomplete="off">
                <button class="btn-add" id="add-btn">Add</button>
            </div>

            <ul class="task-list" id="task-list">
                <!-- Dynamic tasks will be inserted here -->
            </ul>
            
            <div id="empty-msg" class="empty-state">No tasks for today. Add one above!</div>
        </div>
    </div>

    <script>
        // DOM Elements
        const taskInput = document.getElementById('task-input');
        const addBtn = document.getElementById('add-btn');
        const taskList = document.getElementById('task-list');
        const emptyMsg = document.getElementById('empty-msg');
        const dateString = document.getElementById('date-string');

        // Set current date string
        const options = { weekday: 'long', month: 'short', day: 'numeric' };
        dateString.textContent = new Date().toLocaleDateString('en-US', options);

        // App State
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];

        // Functions
        function saveToLocalStorage() {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function updateEmptyState() {
            if (tasks.length === 0) {
                emptyMsg.style.display = 'block';
            } else {
                emptyMsg.style.display = 'none';
            }
        }

        function renderTasks() {
            taskList.innerHTML = '';
            tasks.forEach((task, index) => {
                const li = document.createElement('li');
                li.className = `task-item ${task.completed ? 'completed' : ''}`;

                li.innerHTML = `
                    <div class="task-left">
                        <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${index})">
                        <span class="task-text">${escapeHtml(task.text)}</span>
                    </div>
                    <button class="btn-delete" onclick="deleteTask(${index})">&times;</button>
                `;
                taskList.appendChild(li);
            });
            updateEmptyState();
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (text === '') return;

            tasks.push({ text: text, completed: false });
            taskInput.value = '';
            
            saveToLocalStorage();
            renderTasks();
        }

        function toggleTask(index) {
            tasks[index].completed = !tasks[index].completed;
            saveToLocalStorage();
            renderTasks();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveToLocalStorage();
            renderTasks();
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Event Listeners
        addBtn.addEventListener('click', addTask);
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        // Initial Render
        renderTasks();
    </script>
</body>
</html>
